# Manifesto f,g compile — two sections.
# DSPyFamilyConfig field defaults are now paper-canonical (gepa, heavy,
# 32k context, 1024 max_completion, batch_size=64, max_concurrent=512,
# routing=affinity_load_aware, gepa_kwargs with strong defaults), so
# [family] only needs the manifesto-specific overrides.
#
# [family]   → src.ctreepo.dspy_family.DSPyFamilyConfig
# [lm]       → treepo.cld.canonical_defaults.LmSection

[family]
include_identity_targets = true     # required for chunked-manifesto artifact
                                    # (only roots have teacher summaries)
max_input_chars          = 96000    # caller-side eval-pool filter; only
                                    # matters at k=0 raw_concat baseline

[lm]
model     = "nvidia/Gemma-4-31B-IT-NVFP4"
endpoints = [
  "http://localhost:8000/v1",
  "http://localhost:8001/v1",
  "http://localhost:8002/v1",
  "http://localhost:8003/v1",
]
