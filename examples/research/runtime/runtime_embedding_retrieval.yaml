experiment_id: lbv2_retrieval_smoke
benchmark:
  family: longbench_v2
  dataset: examples/research/runtime/longbench_v2_tiny.yaml
  split: fixture
methods:
  - retrieval
scorer:
  kind: openai_compatible
  endpoint: http://localhost:8000/v1
  model: local-chat-model
  api_key: EMPTY
embedder:
  kind: openai_compatible
  endpoint: http://localhost:8003/v1
  model: local-embedding-model
  api_key: EMPTY
oracle:
  kind: benchmark_labels
runtime_defaults:
  mock: true
  chunk_chars: 2000
  top_k: 6
  temperature: 0.0
  max_output_tokens: 4
