experiment_id: lbv2_full_context_smoke
benchmark:
  family: longbench_v2
  dataset: examples/longbench_v2_tiny.yaml
  split: fixture
methods:
  - full_context
scorer:
  kind: openai_compatible
  endpoint: http://localhost:8000/v1
  model: local-chat-model
  api_key: EMPTY
oracle:
  kind: benchmark_labels
runtime_defaults:
  mock: true
  max_context_tokens: 8192
  temperature: 0.0
  max_output_tokens: 4
