version: 2
policy:
  default: outside
  classes:
    - package
    - cli
    - shim
    - outside
    - extension

areas:
  - id: sketches
    status: ready
    package: treepo.bench.classical_sketches
    note: Classical sketch comparison and DataSketches-backed HLL example.
  - id: task_benchmarks
    status: ready
    package: treepo.bench.tasks
    note: Package-native task benchmark contract with a built-in Markov changepoint benchmark.
  - id: llm
    status: optional
    package: treepo.llm
    note: OpenAI-compatible chat-payload and embedding-client helpers (hashing, HTTP, disk-cached) live behind treepo[llm].
  - id: manifesto_rile
    status: constants
    package: treepo.tasks.manifesto
    note: Manifesto/RILE constants are packaged; training integrations register from downstream packages.
  - id: training
    status: optional
    package: treepo.training
    note: Local-law tensor objectives (treepo.training.local_law).
  - id: statistics
    status: ready
    package: treepo.statistic
    note: Public composable-state protocol and family statistic helper.
  - id: task_state
    status: ready
    package: treepo.state
    note: Public JSONable task-state and tree-unit reference helpers.
  - id: finetune_views
    status: ready
    package: treepo.finetune
    note: Trainer-neutral embedding and LLM fine-tuning exports over PreferenceDataset.
  - id: neural_operator
    status: ready
    package: treepo.methods.fno
    note: Built-in generic neural-operator family over embedded leaf sequences; FNO and Conv1D are built-in operator kinds.
  - id: app_families
    status: extension
    note: Application runtimes register from downstream packages; DSPy is a provider-neutral built-in wrapper.

entries:
  - path: src/treepo/bench
    target: treepo.bench
    class: package
    note: Benchmark runs and checks.
  - path: src/treepo/llm
    target: treepo.llm
    class: package
    note: Lightweight LLM and embedding helper contracts.
  - path: src/treepo/methods
    target: treepo.methods
    class: package
    note: Public method contracts and built-in lightweight families.
  - path: src/treepo/training
    target: treepo.training
    class: package
    note: Local-law training objectives.
  - path: src/treepo/statistic.py
    target: treepo.statistic
    class: package
    note: Public composable statistic protocol without optional dependencies.
  - path: src/treepo/state.py
    target: treepo.state
    class: package
    note: Public JSONable task-state and unit-reference records without optional dependencies.
  - path: src/treepo/finetune.py
    target: treepo.finetune
    class: package
    note: Trainer-neutral fine-tuning views exported from the single PreferenceDataset boundary.
  - path: scripts/start_vllm.sh
    target: scripts/start_vllm.sh
    class: shim
    note: Thin local server helper for source-tree users.
  - path: scripts/start_sglang.sh
    target: scripts/start_sglang.sh
    class: shim
    note: Thin local server helper for source-tree users.
  - path: scripts/start_engine.py
    target: scripts/start_engine.py
    class: shim
    note: Small wrapper dispatcher without external registry imports.
  - path: scripts/run_publication_validation.py
    target: scripts/run_publication_validation.py
    class: shim
    note: Pre-publication validation driver over tests, release gates, and example runs.
  - path: downstream_packages
    target: external packages
    class: extension
    note: Application runtimes live outside treepo; DSPy is a provider-neutral built-in wrapper.
