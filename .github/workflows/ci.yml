name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Run all tests
        run: uv run pytest tests/

  launch-gate:
    # Smoke-checks the treepo-bench CLI runs end-to-end with frozen deps.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Sync (frozen)
        run: uv sync --frozen

      - name: Launch gate
        run: uv run treepo-bench check launch --json

      - name: Paper smoke enumerates
        run: |
          uv run treepo-bench suite paper-smoke \
            --out-root /tmp/treepo_paper_smoke \
            --jobs 1 \
            --commands-only
