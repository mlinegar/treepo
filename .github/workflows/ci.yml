name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Run all tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/

  release-gate:
    # Runs the package release checks with frozen deps.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Lockfile matches pyproject
        run: uv lock --check

      - name: Sync (frozen)
        run: uv sync --frozen

      - name: Release checks
        run: uv run treepo-bench check release --json

      - name: Release gate
        run: uv run python -m treepo.release

      - name: Build wheel and sdist
        run: uv build --wheel --sdist --out-dir /tmp/treepo_release_artifacts
